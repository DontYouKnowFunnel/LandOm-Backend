services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init-db:/docker-entrypoint-initdb.d
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user \"${CLICKHOUSE_USER}\" --password \"${CLICKHOUSE_PASSWORD}\" --query \"SELECT 1\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  landom-app:
    build: .
    platform: linux/amd64
    container_name: landom-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CLICKHOUSE_SCHEMA_PATH: file:/app/init-db/init-clickhouse.sql
      LANDOM_SESSION_STATUS_TIMEOUT_ENABLED: ${LANDOM_SESSION_STATUS_TIMEOUT_ENABLED:-true}
    volumes:
      - ./init-db:/app/init-db:ro

volumes:
  mysql_data:
  clickhouse_data:
